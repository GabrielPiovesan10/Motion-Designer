<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deck Churrascaria | Pesquisa</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --deck-red: #e63946;
            --deck-dark: #121212;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            /* FUNDO DE MADEIRA RÚSTICA ESCURA */
            background-color: #1a1a1a;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                              url('https://images.unsplash.com/photo-1589182337358-2cb63099350c?q=80&w=1974&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 4px solid var(--deck-red);
            line-height: 0;
        }

        .header-logo-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .page-titles {
            text-align: center;
            margin: 30px 20px 10px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
        }

        .main-brand-title {
            font-size: 2rem;
            font-weight: 900;
            color: var(--deck-red);
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 2px;
        }

        .survey-subtitle {
            font-size: 1.1rem;
            color: #fff;
            margin: 5px 0 0;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: lowercase;
        }

        .container {
            width: 90%;
            max-width: 450px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(20, 20, 20, 0.96); /* Quase preto para ler bem */
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            margin-top: 15px;
            border: 1px solid #333;
        }

        h2 { font-size: 1.2rem; margin-bottom: 20px; border-bottom: 1px solid var(--deck-red); padding-bottom: 10px; }

        label {
            display: block;
            text-align: left;
            margin: 15px 0 5px;
            font-size: 0.9rem;
            color: #ccc;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            background: #000;
            border: 1px solid #444;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--deck-red); }

        .btn-enviar {
            background: var(--deck-red);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 30px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(230, 57, 70, 0.4);
            transition: 0.3s;
        }

        .btn-enviar:active { transform: scale(0.97); }

        #sucesso { display: none; padding: 30px; text-align: center; }
        .check-icon { font-size: 4rem; color: #27c93f; margin-bottom: 15px; }

        footer {
            margin-top: auto;
            padding: 25px;
            text-align: center;
            font-size: 0.8rem;
            color: #fff;
            background: rgba(0,0,0,0.85);
            width: 100%;
        }

        .footer-highlight {
            color: var(--deck-red);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo-deck.JPG" alt="Deck Logo" class="header-logo-img" data-aos="fade-down">
    </header>

    <div class="page-titles" data-aos="fade-up">
        <h1 class="main-brand-title">Deck Churrascaria</h1>
        <p class="survey-subtitle">pesquisa de satisfação</p>
    </div>

    <div class="container">
        <div class="card" data-aos="zoom-in" id="card-form">
            <h2>Sua experiência hoje</h2>
            <form id="feedback-form">
                <label><i class="fas fa-user"></i> Qual o seu nome?</label>
                <input type="text" placeholder="Digite seu nome...">

                <label><i class="fas fa-utensils"></i> O ponto da carne estava correto?</label>
                <select>
                    <option>⭐⭐⭐⭐⭐ (Perfeito!)</option>
                    <option>⭐⭐⭐⭐ (Muito bom)</option>
                    <option>⭐⭐⭐ (Regular)</option>
                    <option>⭐ (Pode melhorar)</option>
                </select>

                <label><i class="fas fa-concierge-bell"></i> Nota para o atendimento:</label>
                <select>
                    <option>⭐⭐⭐⭐⭐ (Excepcional)</option>
                    <option>⭐⭐⭐⭐ (Bom)</option>
                    <option>⭐ (Lento)</option>
                </select>

                <label><i class="fas fa-comment"></i> Quer deixar um recado?</label>
                <textarea rows="3" placeholder="Sugestões ou elogios..."></textarea>

                <button type="submit" class="btn-enviar" id="btn-submit">ENVIAR AVALIAÇÃO</button>
            </form>

            <div id="sucesso">
                <i class="fas fa-check-circle check-icon"></i>
                <h3>Obrigado pela visita!</h3>
                <p style="color: #bbb;">Sua avaliação foi registrada com sucesso.</p>
                <button onclick="location.reload()" style="background:none; border:1px solid #555; color:#fff; padding:8px 15px; border-radius:8px; margin-top:15px; cursor:pointer;">Nova Avaliação</button>
            </div>
        </div>
    </div>

    <footer>
        Desenvolvido por <strong>Gabriel Piovesan</strong><br>
        <span class="footer-highlight">Tecnologia Deck Satisfaction</span> © 2026
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true, duration: 800 });
        const f = document.getElementById('feedback-form');
        f.onsubmit = (e) => {
            e.preventDefault();
            document.getElementById('btn-submit').innerText = "ENVIANDO...";
            setTimeout(() => {
                f.style.display = 'none';
                document.getElementById('sucesso').style.display = 'block';
            }, 1500);
        };
    </script>
</body>
</html>
