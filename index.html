<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deck Churrascaria | Pesquisa</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        :root { --deck-orange: #ff9f43; }

        html, body { 
            width: 100%; 
            min-height: 100vh;
            background-color: #000;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* O FUNDO DE MADEIRA QUE VOCÊ QUERIA */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1513161455079-7dc1de15ef3e?auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header {
            width: 100%;
            padding: 40px 20px;
            text-align: center;
        }
        
        .logo-img {
            max-width: 220px;
            filter: drop-shadow(0px 5px 15px rgba(0,0,0,0.8));
        }

        .container { width: 92%; max-width: 450px; margin-bottom: 50px; }

        /* O LUGAR DAS PERGUNTAS TRANSPARENTE */
        .card {
            background: rgba(0, 0, 0, 0.75); /* Transparência forte e elegante */
            padding: 30px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            text-align: center;
        }

        .pergunta-label {
            display: block;
            text-align: left;
            margin: 20px 0 8px;
            font-weight: 700;
            font-size: 1rem;
            color: var(--deck-orange);
            text-transform: uppercase;
        }

        /* ESTRELAS */
        .stars-container { display: flex; flex-direction: row-reverse; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .stars-container input { display: none; }
        .stars-container label { font-size: 2.6rem; color: #333; cursor: pointer; transition: 0.2s; }
        
        .stars-container input:checked ~ label, 
        .stars-container label:hover, 
        .stars-container label:hover ~ label {
            color: var(--deck-orange);
            text-shadow: 0 0 15px rgba(255, 159, 67, 0.5);
        }

        input, textarea {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05); /* Input também transparente */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            margin-bottom: 10px;
        }

        .btn-enviar {
            background: var(--deck-orange);
            color: white;
            border: none;
            padding: 20px;
            width: 100%;
            border-radius: 15px;
            font-weight: 900;
            font-size: 1.2rem;
            margin-top: 25px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        #sucesso { display: none; padding: 30px 0; }
        .check-icon { font-size: 5rem; color: #27c93f; margin-bottom: 20px; }

        #msg-erro-zap {
            display: none; background: rgba(255, 0, 0, 0.2); border: 1px solid red;
            color: #fff; padding: 12px; border-radius: 8px; margin-top: 10px; font-weight: bold;
        }

        footer { padding: 30px; font-size: 0.8rem; color: #666; text-align: center; }
    </style>
</head>
<body>

    <header data-aos="fade-down">
        <img src="logo_deck.PNG" alt="Deck Churrascaria" class="logo-img">
    </header>

    <div class="container">
        <div class="card" data-aos="zoom-in">
            
            <form id="feedback-form">
                
                <label class="pergunta-label"><i class="fas fa-utensils"></i> Nota para a Carne:</label>
                <div class="stars-container">
                    <input type="radio" name="carne" id="c5" value="5" required><label for="c5" class="fas fa-star"></label>
                    <input type="radio" name="carne" id="c4" value="4"><label for="c4" class="fas fa-star"></label>
                    <input type="radio" name="carne" id="c3" value="3"><label for="c3" class="fas fa-star"></label>
                    <input type="radio" name="carne" id="c2" value="2"><label for="c2" class="fas fa-star"></label>
                    <input type="radio" name="carne" id="c1" value="1"><label for="c1" class="fas fa-star"></label>
                </div>

                <label class="pergunta-label"><i class="fas fa-star"></i> Atendimento:</label>
                <div class="stars-container">
                    <input type="radio" name="atendimento" id="a5" value="5" required><label for="a5" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a4" value="4"><label for="a4" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a3" value="3"><label for="a3" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a2" value="2"><label for="a2" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a1" value="1"><label for="a1" class="fas fa-star"></label>
                </div>

                <label class="pergunta-label"><i class="fas fa-broom"></i> Limpeza e Organização:</label>
                <div class="stars-container">
                    <input type="radio" name="limpeza" id="l5" value="5" required><label for="l5" class="fas fa-star"></label>
                    <input type="radio" name="limpeza" id="l4" value="4"><label for="l4" class="fas fa-star"></label>
                    <input type="radio" name="limpeza" id="l3" value="3"><label for="l3" class="fas fa-star"></label>
                    <input type="radio" name="limpeza" id="l2" value="2"><label for="l2" class="fas fa-star"></label>
                    <input type="radio" name="limpeza" id="l1" value="1"><label for="l1" class="fas fa-star"></label>
                </div>

                <label class="pergunta-label"><i class="fas fa-heart"></i> Recomendaria o Deck?</label>
                <div class="stars-container">
                    <input type="radio" name="recomenda" id="r5" value="5" required><label for="r5" class="fas fa-star"></label>
                    <input type="radio" name="recomenda" id="r4" value="4"><label for="r4" class="fas fa-star"></label>
                    <input type="radio" name="recomenda" id="r3" value="3"><label for="r3" class="fas fa-star"></label>
                    <input type="radio" name="recomenda" id="r2" value="2"><label for="r2" class="fas fa-star"></label>
                    <input type="radio" name="recomenda" id="r1" value="1"><label for="r1" class="fas fa-star"></label>
                </div>
                
                <label class="pergunta-label">Sugestões:</label>
                <textarea name="sugestoes" rows="2" placeholder="Sua opinião..."></textarea>

                <label class="pergunta-label">Seu Nome:</label>
                <input type="text" name="nome" id="input-nome" placeholder="Digite seu nome" required>

                <label class="pergunta-label">WhatsApp:</label>
                <input type="tel" name="whatsapp" id="input-zap" placeholder="(19) 99999-9999" required>

                <div id="msg-erro-zap">Você já enviou uma avaliação com este número!</div>

                <button type="submit" class="btn-enviar" id="btn-submit">ENVIAR AVALIAÇÃO</button>
            </form>

            <div id="sucesso">
                <i class="fas fa-check-circle check-icon"></i>
                <h2 style="color: var(--deck-orange);">VALEU, <span id="nome-sucesso"></span>!</h2>
                <p style="margin-top: 15px; color: #ccc;">Sua avaliação foi enviada com sucesso.</p>
                <button onclick="location.reload();" style="background:none; border:2px solid var(--deck-orange); color:var(--deck-orange); padding:10px 20px; border-radius:12px; margin-top:30px; cursor:pointer; font-weight: bold;">
                    NOVA AVALIAÇÃO
                </button>
            </div>
        </div>
    </div>

    <footer>
        Desenvolvido por <strong>Gabriel Piovesan</strong><br>
        Deck Churrascaria | 2026
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });
        
        const f = document.getElementById('feedback-form');
        const btnSubmit = document.getElementById('btn-submit');
        const inputZap = document.getElementById('input-zap');
        const msgErroZap = document.getElementById('msg-erro-zap');

        // SUBSTITUA PELO SEU LINK DA NOVA PLANILHA
        const scriptURL = 'COLOQUE_AQUI_O_LINK_DO_SCRIPT_DA_PLANILHA_DO_DECK';

        f.onsubmit = (e) => {
            e.preventDefault();
            
            let zaps = JSON.parse(localStorage.getItem('deckZaps') || '[]');
            let zapAtual = inputZap.value.replace(/\D/g,'');

            if(zaps.includes(zapAtual)) {
                msgErroZap.style.display = 'block';
                return;
            }

            btnSubmit.innerText = "ENVIANDO...";
            btnSubmit.disabled = true;

            const nome = document.getElementById('input-nome').value.split(' ')[0].toUpperCase();
            document.getElementById('nome-sucesso').innerText = nome;

            fetch(scriptURL, { method: 'POST', body: new FormData(f) })
                .then(response => {
                    zaps.push(zapAtual);
                    localStorage.setItem('deckZaps', JSON.stringify(zaps));
                    f.style.display = 'none';
                    document.getElementById('sucesso').style.display = 'block';
                    window.scrollTo(0,0);
                })
                .catch(error => {
                    btnSubmit.innerText = "ERRO! TENTE NOVAMENTE.";
                    btnSubmit.disabled = false;
                });
        };
    </script>
</body>
</html>
