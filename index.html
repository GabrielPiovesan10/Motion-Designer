<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deck Churrascaria | Avaliação</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* FUNDO DE MADEIRA ESCURA */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1513161455079-7dc1de15ef3e?ixlib=rb-1.2.1&auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header {
            width: 100%;
            padding: 40px 20px;
            text-align: center;
        }

        .logo-deck {
            font-size: 2.5rem;
            font-weight: 900;
            color: #ff9f43; /* Laranja Churrasco */
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.8);
        }

        .container { width: 92%; max-width: 450px; margin-bottom: 50px; }

        /* EFEITO TRANSPARENTE (GLASSMORPHISM) */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .pergunta-label {
            display: block;
            margin: 20px 0 10px;
            font-weight: 600;
            font-size: 1rem;
            color: #ff9f43;
            text-transform: uppercase;
        }

        /* ESTRELAS PERSONALIZADAS */
        .stars-container { display: flex; flex-direction: row-reverse; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .stars-container input { display: none; }
        .stars-container label { font-size: 2.5rem; color: rgba(255,255,255,0.2); cursor: pointer; transition: 0.3s; }
        
        .stars-container input:checked ~ label,
        .stars-container label:hover,
        .stars-container label:hover ~ label {
            color: #ff9f43;
            text-shadow: 0 0 15px rgba(255, 159, 67, 0.5);
        }

        input, textarea {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
        }

        .btn-enviar {
            background: #ff9f43;
            color: #fff;
            border: none;
            padding: 20px;
            width: 100%;
            border-radius: 15px;
            font-weight: 900;
            font-size: 1.2rem;
            margin-top: 20px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(255, 159, 67, 0.3);
        }

        #sucesso { display: none; text-align: center; padding: 20px 0; }
        .check-icon { font-size: 5rem; color: #2ecc71; margin-bottom: 20px; }

        footer {
            padding: 20px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-deck.JPG" data-aos="fade-down">DECK</div>
        <p style="color: #ccc; letter-spacing: 1px;">CHURRASCARIA</p>
    </header>

    <div class="container">
        <div class="card" data-aos="zoom-in">
            
            <form id="form-deck">
                <label class="pergunta-label">Qual nota para nossa carne?</label>
                <div class="stars-container">
                    <input type="radio" name="carne" id="c5" value="5" required><label for="c5" class="fas fa-star"></label>
                    <input type="radio" name="carne" id="c4" value="4"><label for="c4" class="fas fa-star"></label>
                    <input type="radio" name="carne" id="c3" value="3"><label for="c3" class="fas fa-star"></label>
                    <input type="radio" name="carne" id="c2" value="2"><label for="c2" class="fas fa-star"></label>
                    <input type="radio" name="carne" id="c1" value="1"><label for="c1" class="fas fa-star"></label>
                </div>

                <label class="pergunta-label">Atendimento e Agilidade:</label>
                <div class="stars-container">
                    <input type="radio" name="atendimento" id="a5" value="5" required><label for="a5" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a4" value="4"><label for="a4" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a3" value="3"><label for="a3" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a2" value="2"><label for="a2" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a1" value="1"><label for="a1" class="fas fa-star"></label>
                </div>

                <label class="pergunta-label">Seu Nome:</label>
                <input type="text" name="nome" placeholder="Ex: Gabriel Piovesan" required>

                <label class="pergunta-label">WhatsApp:</label>
                <input type="tel" name="whatsapp" id="zap" placeholder="(19) 99999-9999" required>

                <button type="submit" class="btn-enviar" id="btn-submit">Enviar Avaliação</button>
            </form>

            <div id="sucesso">
                <i class="fas fa-check-circle check-icon"></i>
                <h2>Obrigado!</h2>
                <p style="margin-top: 10px; color: #eee;">Sua avaliação ajuda o Deck a ser cada vez melhor.</p>
                <button onclick="location.reload();" style="background:none; border:1px solid #ff9f43; color:#ff9f43; padding:10px 20px; border-radius:10px; margin-top:30px; cursor:pointer;">Nova Avaliação</button>
            </div>

        </div>
    </div>

    <footer>
        Desenvolvido por <strong>Gabriel Piovesan</strong><br>
        Deck Churrascaria © 2026
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        const f = document.getElementById('form-deck');
        const btn = document.getElementById('btn-submit');
        const zapInput = document.getElementById('zap');

        // SUBSTITUA PELO SEU LINK DO GOOGLE SCRIPT DO DECK
        const scriptURL = 'COLOQUE_AQUI_O_LINK_DO_SCRIPT_DA_PLANILHA_DO_DECK';

        f.onsubmit = (e) => {
            e.preventDefault();
            
            // Lógica antifraude (mesmo zap)
            let zaps = JSON.parse(localStorage.getItem('deckZaps') || '[]');
            let atual = zapInput.value.replace(/\D/g,'');

            if(zaps.includes(atual)) {
                alert("Este WhatsApp já enviou uma avaliação hoje!");
                return;
            }

            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            fetch(scriptURL, { method: 'POST', body: new FormData(f)})
            .then(res => {
                zaps.push(atual);
                localStorage.setItem('deckZaps', JSON.stringify(zaps));
                f.style.display = 'none';
                document.getElementById('sucesso').style.display = 'block';
            })
            .catch(err => {
                btn.innerText = "ERRO AO ENVIAR";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
