<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deck Churrascaria</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Arial', sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* FUNDO DE MADEIRA RAIZ */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://www.toptal.com/designers/subtlepatterns/patterns/dark_wood.png');
            background-color: #1a1a1a;
        }

        header { padding: 30px 20px; text-align: center; }
        .logo-deck { font-size: 2.2rem; font-weight: 900; color: #f39c12; text-transform: uppercase; }

        .container { width: 90%; max-width: 400px; margin-bottom: 40px; }

        /* CARD TRANSPARENTE SIMPLES (SEM BUGAR) */
        .card {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .pergunta-label {
            display: block;
            margin: 15px 0 5px;
            font-weight: bold;
            color: #f39c12;
            text-align: left;
        }

        /* ESTRELAS QUE NÃO TRAVAM */
        .stars-container { display: flex; flex-direction: row-reverse; justify-content: center; gap: 5px; margin-bottom: 15px; }
        .stars-container input { display: none; }
        .stars-container label { font-size: 2rem; color: #444; cursor: pointer; }
        
        .stars-container input:checked ~ label,
        .stars-container label:hover,
        .stars-container label:hover ~ label { color: #f39c12; }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            margin-bottom: 10px;
            outline: none;
        }

        .btn-enviar {
            background: #f39c12;
            color: #000;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 15px;
            text-transform: uppercase;
        }

        #sucesso { display: none; padding: 20px; }
        .check-icon { font-size: 4rem; color: #27ae60; margin-bottom: 15px; }

        footer { padding: 20px; font-size: 0.7rem; color: #666; }
    </style>
</head>
<body>

    <header>
        <div class="logo-deck.JPG">DECK</div>
        <p style="font-size: 0.8rem; letter-spacing: 2px;">CHURRASCARIA</p>
    </header>

    <div class="container">
        <div class="card">
            
            <form id="form-deck">
                <label class="pergunta-label">Nota para a Carne:</label>
                <div class="stars-container">
                    <input type="radio" name="carne" id="c5" value="5" required><label for="c5" class="fas fa-star"></label>
                    <input type="radio" name="carne" id="c4" value="4"><label for="c4" class="fas fa-star"></label>
                    <input type="radio" name="carne" id="c3" value="3"><label for="c3" class="fas fa-star"></label>
                    <input type="radio" name="carne" id="c2" value="2"><label for="c2" class="fas fa-star"></label>
                    <input type="radio" name="carne" id="c1" value="1"><label for="c1" class="fas fa-star"></label>
                </div>

                <label class="pergunta-label">Atendimento:</label>
                <div class="stars-container">
                    <input type="radio" name="atendimento" id="a5" value="5" required><label for="a5" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a4" value="4"><label for="a4" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a3" value="3"><label for="a3" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a2" value="2"><label for="a2" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a1" value="1"><label for="a1" class="fas fa-star"></label>
                </div>

                <label class="pergunta-label">Seu Nome:</label>
                <input type="text" name="nome" placeholder="Seu nome" required>

                <label class="pergunta-label">WhatsApp:</label>
                <input type="tel" name="whatsapp" id="zap" placeholder="(19) 99999-9999" required>

                <button type="submit" class="btn-enviar" id="btn-submit">Enviar</button>
            </form>

            <div id="sucesso">
                <i class="fas fa-check-circle check-icon"></i>
                <h3>Obrigado!</h3>
                <p style="margin-top: 10px;">Avaliação enviada com sucesso.</p>
                <button onclick="location.reload();" style="background:none; border:1px solid #f39c12; color:#f39c12; padding:8px 15px; border-radius:5px; margin-top:20px;">Nova Avaliação</button>
            </div>

        </div>
    </div>

    <footer>
        Gabriel Piovesan | Deck Churrascaria © 2026
    </footer>

    <script>
        const f = document.getElementById('form-deck');
        const btn = document.getElementById('btn-submit');
        const scriptURL = 'SEU_LINK_AQUI'; // Lembre de trocar pelo link da nova planilha!

        f.onsubmit = (e) => {
            e.preventDefault();
            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            fetch(scriptURL, { method: 'POST', body: new FormData(f)})
            .then(res => {
                f.style.display = 'none';
                document.getElementById('sucesso').style.display = 'block';
            })
            .catch(err => {
                btn.innerText = "ERRO";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
