<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deck Churrascaria | Sua Opinião</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --deck-red: #e63946;
            --deck-dark: #121212;
            --deck-gold: #ffb703;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--deck-dark);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Topo Premium com a nova logo */
        header {
            width: 100%;
            padding: 20px 0;
            /* Mantive o gradiente sutil para dar profundidade */
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9));
            background-color: var(--deck-dark);
            text-align: center;
            border-bottom: 4px solid var(--deck-red);
        }

        /* Estilização da nova logo imagem */
        .header-logo-img {
            max-width: 180px; /* Tamanho ideal para mobile */
            height: auto;
            display: inline-block;
            margin: 10px auto;
        }

        .container {
            width: 90%;
            max-width: 450px;
            margin: 20px auto 40px; /* Ajuste de margem para compensar o topo */
        }

        .card {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            text-align: center;
        }

        h2 { font-size: 1.3rem; margin-bottom: 25px; color: #fff; }

        label {
            display: block;
            text-align: left;
            margin: 20px 0 8px;
            font-size: 0.9rem;
            color: #bbb;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 15px;
            background: #121212;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--deck-red); }

        .btn-enviar {
            background: var(--deck-red);
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(230, 57, 70, 0.4);
            transition: 0.3s;
        }

        .btn-enviar:active { transform: scale(0.98); }

        /* Mensagem de Sucesso */
        #sucesso {
            display: none;
            padding: 40px 20px;
        }
        
        .check-icon {
            font-size: 4rem;
            color: #27c93f;
            margin-bottom: 20px;
        }

        footer {
            margin-top: auto;
            padding: 30px;
            font-size: 0.8rem;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo-deck.JPG" alt="Deck Churrascaria Logo" class="header-logo-img" data-aos="fade-down">
    </header>

    <div class="container">
        <div class="card" data-aos="zoom-in" id="card-principal">
            <h2>Sua experiência hoje</h2>
            
            <form id="form-teste">
                <label>Qual o seu nome?</label>
                <input type="text" placeholder="Ex: Gabriel Piovesan">

                <label>Como estava o ponto da carne?</label>
                <select>
                    <option>⭐⭐⭐⭐⭐ (Impecável)</option>
                    <option>⭐⭐⭐⭐ (Muito bom)</option>
                    <option>⭐⭐⭐ (Na média)</option>
                    <option>⭐⭐ (Pode melhorar)</option>
                    <option>⭐ (Ruim)</option>
                </select>

                <label>O atendimento foi ágil?</label>
                <select>
                    <option>⭐⭐⭐⭐⭐ (Sim, muito!)</option>
                    <option>⭐⭐⭐⭐ (Sim)</option>
                    <option>⭐⭐⭐ (Demorou um pouco)</option>
                    <option>⭐ (Muito lento)</option>
                </select>

                <label>Deixe um recado para a equipe:</label>
                <textarea rows="3" placeholder="Sugestões ou elogios..."></textarea>

                <button type="submit" class="btn-enviar" id="btn-demo">ENVIAR AVALIAÇÃO</button>
            </form>

            <div id="sucesso">
                <div class="check-icon"><i class="fas fa-check-circle"></i></div>
                <h3>Obrigado pela preferência!</h3>
                <p style="color: #aaa;">Sua avaliação ajuda a manter nossa qualidade.</p>
                <button onclick="window.location.reload()" style="background:transparent; color:#555; border:1px solid #333; padding:10px; border-radius:8px; margin-top:20px; cursor:pointer;">Voltar</button>
            </div>
        </div>
    </div>

    <footer>
        Desenvolvido por <strong>Gabriel Piovesan</strong><br>
        Tecnologia Deck Satisfaction © 2026
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        const form = document.getElementById('form-teste');
        const card = document.getElementById('card-principal');
        const sucesso = document.getElementById('sucesso');

        form.onsubmit = (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-demo');
            btn.innerText = "PROCESSANDO...";
            
            // Simula o tempo de rede para ela ver que o site "pensa"
            setTimeout(() => {
                form.style.display = 'none';
                document.querySelector('h2').style.display = 'none';
                sucesso.style.display = 'block';
                AOS.refresh();
            }, 1500);
        };
    </script>
</body>
</html>
