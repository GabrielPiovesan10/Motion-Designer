<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deck Churrascaria | Pesquisa</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --deck-gold: #ff9f43; /* Tom de Madeira Premium */
            --star-active: #f1c40f;
        }

        html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; background-color: #1a1a1a; }

        body {
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            
            /* MADEIRA ATÉ O TOPO E SEM PIXELAR (REPEAT) */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('madeira.JPG'); 
            background-size: 400px; /* Tamanho fixo para não esticar a imagem */
            background-repeat: repeat;
            background-attachment: fixed;
        }

        /* LOGO PULSANTE E MAIS JUNTA */
        header { width: 100%; padding: 15px 10px 0; text-align: center; background: transparent; }
        
        @keyframes pulsar {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }

        .logo-img {
            width: 50%; /* Logo menor e mais elegante */
            max-width: 180px;
            filter: drop-shadow(0px 5px 15px rgba(0,0,0,0.8));
            animation: pulsar 2.5s ease-in-out infinite;
        }

        /* TÍTULOS MAIS PRÓXIMOS */
        .page-titles { text-align: center; margin: 5px 0 15px; }
        .main-title { font-size: 1.8rem; font-weight: 900; color: var(--deck-gold); text-transform: uppercase; margin: 0; letter-spacing: 1px; }
        .sub-title { font-size: 1.1rem; color: #fff; text-transform: uppercase; font-weight: bold; margin-top: 2px; opacity: 0.9; }

        .container { width: 92%; max-width: 420px; margin-bottom: 30px; }

        /* CAIXA DE SORTEIO COMPACTA (ESTILO PACHECO) */
        .promo-card {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid var(--deck-gold);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
            box-shadow: 0 0 15px rgba(255, 159, 67, 0.3);
        }
        .promo-icon { font-size: 1.8rem; color: var(--deck-gold); margin-bottom: 8px; }
        .promo-txt { font-size: 0.85rem; font-weight: bold; margin: 2px 0; letter-spacing: 0.5px; }
        .promo-prize { font-size: 1.1rem; color: var(--deck-gold); font-weight: 900; margin-top: 5px; text-transform: uppercase; }

        /* CARD DE PERGUNTAS TRANSPARENTE (GLASS) */
        .card {
            background: rgba(0, 0, 0, 0.35); /* Transparência para ver a madeira */
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .pergunta-label { display: block; text-align: left; margin: 15px 0 8px; font-weight: bold; font-size: 0.9rem; color: #fff; }

        /* SISTEMA DE ESTRELAS */
        .stars { display: flex; flex-direction: row-reverse; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .stars input { display: none; }
        .stars label { font-size: 2.2rem; color: rgba(255,255,255,0.2); cursor: pointer; transition: 0.2s; }
        .stars input:checked ~ label, .stars label:hover, .stars label:hover ~ label { color: var(--star-active); text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }

        input, textarea {
            width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 10px; color: white; font-size: 1rem; outline: none;
        }

        .btn-enviar {
            background: var(--deck-gold); color: #000; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: 900; font-size: 1.1rem; margin-top: 25px; cursor: pointer; text-transform: uppercase;
        }

        #sucesso { display: none; padding: 30px 10px; }
        .check-icon { font-size: 4rem; color: #2ecc71; margin-bottom: 15px; }

        footer { padding: 25px; font-size: 0.75rem; color: #888; text-align: center; width: 100%; }
    </style>
</head>
<body>

    <header>
        <img src="logo-deck.PNG" alt="Deck Logo" class="logo-img">
    </header>

    <div class="page-titles">
        <h1 class="main-title">Deck Churrascaria</h1>
        <p class="sub-title">Pesquisa de Satisfação</p>
    </div>

    <div class="container">
        
        <div class="promo-card" data-aos="zoom-in">
            <i class="fas fa-gift promo-icon"></i>
            <p class="promo-txt">RESPONDA E CONCORRA A UMA</p>
            <p class="promo-prize">PICANHA P/2 + ACOMPANHAMENTO</p>
        </div>

        <div class="card" data-aos="fade-up" id="card-principal">
            <form id="feedback-form">
                
                <label><i class="fas fa-user"></i> Seu Nome:</label>
                <input type="text" name="nome" placeholder="Digite seu nome" required>
                
                <label><i class="fab fa-whatsapp"></i> WhatsApp:</label>
                <input type="tel" name="whatsapp" id="input-zap" placeholder="(19) 99999-9999" required>

                <label><i class="fas fa-drumstick-bite"></i> O ponto da carne estava correto?</label>
                <div class="stars">
                    <input type="radio" name="carne" id="c5" value="5" required><label for="c5" class="fas fa-star"></label>
                    <input type="radio" name="carne" id="c4" value="4"><label for="c4" class="fas fa-star"></label>
                    <input type="radio" name="carne" id="c3" value="3"><label for="c3" class="fas fa-star"></label>
                    <input type="radio" name="carne" id="c2" value="2"><label for="c2" class="fas fa-star"></label>
                    <input type="radio" name="carne" id="c1" value="1"><label for="c1" class="fas fa-star"></label>
                </div>

                <label><i class="fas fa-concierge-bell"></i> Nota para o Atendimento:</label>
                <div class="stars">
                    <input type="radio" name="atendimento" id="a5" value="5" required><label for="a5" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a4" value="4"><label for="a4" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a3" value="3"><label for="a3" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a2" value="2"><label for="a2" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a1" value="1"><label for="a1" class="fas fa-star"></label>
                </div>

                <label><i class="fas fa-comment"></i> Alguma sugestão?</label>
                <textarea name="comentario" rows="2" placeholder="Opcional..."></textarea>

                <button type="submit" class="btn-enviar" id="btn-submit">ENVIAR E CONCORRER</button>
            </form>

            <div id="sucesso">
                <i class="fas fa-check-circle check-icon"></i>
                <h2 style="color: var(--deck-gold); margin-bottom: 10px;">OBRIGADO!</h2>
                <p>Sua avaliação foi enviada. Boa sorte no sorteio da Picanha!</p>
                <button onclick="location.reload()" style="background:none; border:2px solid var(--deck-gold); color:#fff; padding:10px 20px; border-radius:10px; margin-top:25px; cursor:pointer; font-weight: bold;">NOVA AVALIAÇÃO</button>
            </div>
        </div>
    </div>

    <footer>
        Gabriel Piovesan | Tecnologia Deck © 2026
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });
        const f = document.getElementById('feedback-form');
        const btn = document.getElementById('btn-submit');
        const scriptURL = 'COLOQUE_AQUI_O_LINK_DA_PLANILHA_DO_DECK';

        f.onsubmit = (e) => {
            e.preventDefault();
            
            let zaps = JSON.parse(localStorage.getItem('deckZaps') || '[]');
            let zapAtual = document.getElementById('input-zap').value.replace(/\D/g,'');

            if(zaps.includes(zapAtual)) {
                alert("Este WhatsApp já participou hoje!");
                return;
            }

            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            fetch(scriptURL, { method: 'POST', body: new FormData(f) })
                .then(response => {
                    zaps.push(zapAtual);
                    localStorage.setItem('deckZaps', JSON.stringify(zaps));
                    f.style.display = 'none';
                    document.getElementById('sucesso').style.display = 'block';
                })
                .catch(error => {
                    btn.innerText = "ERRO! TENTE NOVAMENTE.";
                    btn.disabled = false;
                });
        };
    </script>
</body>
</html>
