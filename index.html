<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deck Churrascaria | Pesquisa</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Trava Global para não vazar nada pro lado */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --deck-red: #e63946;
            --deck-dark: #121212;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden; /* A VACINA contra o erro de arrastar pro lado */
            position: relative;
            background-color: #1a1a1a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Fundo de Madeira Local */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('madeira.JPG'); 
            background-size: contain;
            background-position: center;
            background-attachment: fixed;
            background-repeat: repeat;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Topo sem a linha vermelha */
        header {
            width: 100%;
            padding: 0; 
            background: #000;
            text-align: center;
            border-bottom: none; /* LINHA REMOVIDA */
            line-height: 0;
        }

        .header-logo-img {
            width: 100%;
            max-width: 100%;
            height: auto;
            display: block;
        }

        .page-titles {
            text-align: center;
            margin: 30px 20px 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
        }

        .main-brand-title {
            font-size: 2rem;
            font-weight: 900;
            color: var(--deck-red);
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 2px;
        }

        .survey-subtitle {
            font-size: 1rem;
            color: #fff;
            margin-top: 5px;
            letter-spacing: 2px;
            text-transform: lowercase;
        }

        .container {
            width: 90%;
            max-width: 450px;
            margin: 10px auto 40px;
        }

        /* Efeito Transparente Glassmorphism */
        .card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            text-align: center;
        }

        h2 { font-size: 1.3rem; margin-bottom: 25px; border-bottom: 1px solid rgba(230, 57, 70, 0.3); padding-bottom: 10px; }

        label {
            display: block;
            text-align: left;
            margin: 20px 0 8px;
            font-size: 0.9rem;
            color: #eee;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--deck-red); background: rgba(0,0,0,0.8); }

        .btn-enviar {
            background: var(--deck-red);
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 30px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(230, 57, 70, 0.4);
        }

        .btn-enviar:active { transform: scale(0.96); }

        #sucesso { display: none; padding: 40px 20px; }
        .check-icon { font-size: 4rem; color: #27c93f; margin-bottom: 20px; }

        footer {
            margin-top: auto;
            padding: 30px;
            font-size: 0.8rem;
            color: #ccc;
            text-align: center;
            background: rgba(0,0,0,0.8);
            width: 100%;
        }

        .footer-highlight { color: var(--deck-red); font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <img src="logo-deck.JPG" alt="Deck Logo" class="header-logo-img" data-aos="fade-down">
    </header>

    <div class="page-titles" data-aos="fade-up">
        <h1 class="main-brand-title">Deck Churrascaria</h1>
        <p class="survey-subtitle">pesquisa de satisfação</p>
    </div>

    <div class="container">
        <div class="card" data-aos="zoom-in" id="card-principal">
            <h2>Como foi sua experiência hoje</h2>
            
            <form id="feedback-form">
                <label><i class="fas fa-user"></i> Qual o seu nome?</label>
                <input type="text" placeholder="Digite Seu nome">
                
                <label><i class="fas fa-user"></i> Qual o seu número de telefone?</label>
                <input type="text" placeholder="Digite Seu número">
              
                <label><i class="fas fa-drumstick-bite"></i> O ponto da carne estava correto?</label>
                <select required>
                    <option value="5">⭐⭐⭐⭐⭐ (Perfeito)</option>
                    <option value="4">⭐⭐⭐⭐ (Muito bom)</option>
                    <option value="3">⭐⭐⭐ (Regular)</option>
                    <option value="2">⭐⭐ (Pode melhorar)</option>
                    <option value="1">⭐ (Ruim)</option>
                </select>

                <label><i class="fas fa-concierge-bell"></i> Como avalia nosso atendimento?</label>
                <select required>
                    <option value="5">⭐⭐⭐⭐⭐ (Excepcional)</option>
                    <option value="4">⭐⭐⭐⭐ (Bom)</option>
                    <option value="3">⭐⭐⭐ (Normal)</option>
                    <option value="1">⭐ (Lento/Ruim)</option>
                </select>

                <label><i class="fas fa-beer"></i> As bebidas estavam geladas?</label>
                <select required>
                    <option value="Sim">Sim, no ponto!</option>
                    <option value="Nao">Poderiam estar mais geladas</option>
                </select>

                <label><i class="fas fa-sparkles"></i> Limpeza e Organização:</label>
                <select required>
                    <option value="5">⭐⭐⭐⭐⭐ (Excelente)</option>
                    <option value="4">⭐⭐⭐⭐ (Bom)</option>
                    <option value="1">⭐ (Regular/Ruim)</option>
                </select>

                <label><i class="fas fa-heart"></i> Recomendaria para amigos ou família?</label>
                <select required>
                    <option value="Sim">Com certeza!</option>
                    <option value="Talvez">Talvez</option>
                    <option value="Nao">Não</option>
                </select>

                <label><i class="fas fa-comment"></i> Deixe um comentário ou sugestão:</label>
                <textarea rows="3" placeholder="Conte-nos sua experiência..."></textarea>

                <button type="submit" class="btn-enviar" id="btn-demo">ENVIAR AVALIAÇÃO</button>
            </form>

            <div id="sucesso">
                <i class="fas fa-check-circle check-icon"></i>
                <h3>Obrigado!</h3>
                <p style="color: #aaa;">Sua opinião ajuda a manter nossa qualidade.</p>
                <button onclick="location.reload()" style="background:none; border:1px solid #666; color:#fff; padding:8px 15px; border-radius:8px; margin-top:15px; cursor:pointer;">Voltar</button>
            </div>
        </div>
    </div>

    <footer>
        Desenvolvido por <strong>Gabriel Piovesan</strong><br>
        <span class="footer-highlight">Tecnologia Deck Satisfaction</span> © 2026
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });
        const f = document.getElementById('feedback-form');
        f.onsubmit = (e) => {
            e.preventDefault();
            document.getElementById('btn-demo').innerText = "ENVIANDO...";
            setTimeout(() => {
                f.style.display = 'none';
                document.querySelector('h2').style.display = 'none';
                document.getElementById('sucesso').style.display = 'block';
                AOS.refresh();
            }, 1500);
        };
    </script>
</body>
</html>
