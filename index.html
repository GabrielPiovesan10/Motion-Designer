<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seo Pacheco | Pesquisa</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            overflow-x: hidden;
            background-color: #000;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- HEADER COM CORTE AUTOMÁTICO --- */
        header {
            width: 100%;
            height: 280px; /* Definimos uma altura fixa para o topo */
            overflow: hidden; /* Tudo que sobrar da foto vai ser cortado */
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-logo-img {
            width: 100%;
            height: 100%;
            /* O PULO DO GATO: Ele faz o zoom e corta as bordas pretas da foto */
            object-fit: cover; 
            object-position: center;
        }

        .brand-text-block {
            text-align: center;
            /* PUXA AS LETRAS PARA CIMA DA FOTO COM FORÇA */
            margin-top: -50px; 
            position: relative;
            z-index: 10;
        }

        .main-brand-title {
            font-size: 2.2rem;
            font-weight: 900;
            color: #e63946; /* Vermelho Seo Pacheco */
            text-transform: uppercase;
            text-shadow: 2px 2px 15px rgba(0,0,0,1);
        }

        .survey-subtitle {
            font-size: 1.6rem; 
            color: #ffffff; 
            text-transform: uppercase; 
            font-weight: bold; 
            letter-spacing: 2px;
            text-shadow: 2px 2px 8px rgba(0,0,0,1);
        }

        .container { width: 92%; max-width: 450px; margin: 20px auto 40px; }

        .card {
            background: rgba(30, 30, 30, 0.95);
            padding: 25px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        label { display: block; text-align: left; margin: 18px 0 6px; font-weight: bold; font-size: 0.9rem; }

        input, select, textarea {
            width: 100%; padding: 14px; background: #000;
            border: 1px solid #333; border-radius: 12px; color: white;
        }

        .btn-enviar {
            background: #e63946; color: white; border: none; padding: 18px;
            width: 100%; border-radius: 12px; font-weight: bold; font-size: 1.2rem;
            margin-top: 30px; cursor: pointer;
        }

        #sucesso { display: none; padding: 40px 20px; }
    </style>
</head>
<body>

    <header>
        <img src="pacheco.PNG" alt="Logo" class="header-logo-img">
    </header>

    <div class="brand-text-block">
        <h1 class="main-brand-title">SEO PACHECO</h1>
        <p class="survey-subtitle">PESQUISA DE SATISFAÇÃO</p>
    </div>

    <div class="container">
        <div class="card" id="card-principal">
            <form id="feedback-form">
                <label>Qual o seu nome?</label>
                <input type="text" placeholder="Digite seu nome" required>

                <label>Seu WhatsApp:</label>
                <input type="tel" placeholder="(19) 99999-9999" required>

                <label>A carne estava no ponto?</label>
                <select required>
                    <option value="">Selecione...</option>
                    <option>⭐⭐⭐⭐⭐ (Perfeito)</option>
                    <option>⭐⭐⭐⭐ (Bom)</option>
                    <option>⭐ (Ruim)</option>
                </select>

                <button type="submit" class="btn-enviar" id="btn-demo">ENVIAR AVALIAÇÃO</button>
            </form>

            <div id="sucesso">
                <i class="fas fa-check-circle" style="font-size: 4rem; color: #27c93f;"></i>
                <h3>Avaliação Enviada!</h3>
                <button onclick="location.reload()" style="background:none; border:1px solid #555; color:#fff; padding:10px; border-radius:8px; margin-top:20px;">Voltar</button>
            </div>
        </div>
    </div>

    <script>
        const f = document.getElementById('feedback-form');
        f.onsubmit = (e) => {
            e.preventDefault();
            document.getElementById('btn-demo').innerText = "ENVIANDO...";
            setTimeout(() => {
                f.style.display = 'none';
                document.getElementById('sucesso').style.display = 'block';
            }, 1200);
        };
    </script>
</body>
</html>
