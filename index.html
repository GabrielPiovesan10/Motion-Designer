<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deck Churrascaria | Pesquisa</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --deck-highlight: #ff9f43; /* Cor Madeira/Cobre */
            --star-gold: #f1c40f;
        }

        html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; background-color: #000; }

        body {
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            
            /* FUNDO DE MADEIRA - AJUSTE PARA NÃO PIXELAR (CAMINHO B) */
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('madeira.JPG'); 
            
            /* Em vez de esticar (cover), vamos repetir (repeat) a imagem no tamanho original dela.
               Isso impede que ela fique pixelada, mas muda o padrão visual.
               Usei background-attachment: scroll para iPhone lidar melhor com o repeat. */
            background-size: 300px; /* Força um tamanho pequeno nativo. Ajuste se as tábuas ficarem muito grandes ou pequenas */
            background-position: top left;
            background-repeat: repeat; 
            background-attachment: scroll; 
        }

        header { width: 100%; background: #000; text-align: center; line-height: 0; }
        .header-logo-img { width: 100%; max-width: 100%; height: auto; display: block; }

        .page-titles { text-align: center; margin: 30px 20px 10px; }
        .main-brand-title { font-size: 2.2rem; font-weight: 900; color: var(--deck-highlight); text-transform: uppercase; margin: 0; letter-spacing: 2px; text-shadow: 2px 2px 10px rgba(0,0,0,0.9); }
        .survey-subtitle { font-size: 1.6rem; color: #fff; text-transform: uppercase; font-weight: bold; letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }

        .container { width: 92%; max-width: 450px; margin: 10px auto 40px; }

        /* TRANSPARÊNCIA DE VIDRO (GLASSMORPHISM) */
        .card {
            background: rgba(0, 0, 0, 0.25); /* 25% DE PRETO - Madeira vaza bastante! */
            backdrop-filter: blur(5px); /* Blur bem leve */
            -webkit-backdrop-filter: blur(5px);
            padding: 25px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.15); /* Bordinha de vidro */
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 { font-size: 1.3rem; margin-bottom: 25px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 10px; color: var(--deck-highlight); text-shadow: 1px 1px 5px #000; }
        label { display: block; text-align: left; margin: 25px 0 10px; font-size: 0.95rem; font-weight: bold; text-shadow: 1px 1px 3px #000; }

        /* SISTEMA DE ESTRELINHAS */
        .stars-container { display: flex; flex-direction: row-reverse; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .stars-container input { display: none; }
        .stars-container label { font-size: 2.5rem; color: rgba(255,255,255,0.2); cursor: pointer; transition: 0.2s; }
        .stars-container input:checked ~ label, .stars-container label:hover, .stars-container label:hover ~ label {
            color: var(--star-gold); text-shadow: 0 0 10px rgba(241, 196, 15, 0.6);
        }

        input, select, textarea {
            width: 100%; padding: 14px; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; color: white; font-size: 1rem; outline: none;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--deck-highlight); background: rgba(0,0,0,0.7); }

        .btn-enviar {
            background: var(--deck-highlight); color: #000; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 900; font-size: 1.2rem; margin-top: 35px; cursor: pointer; text-transform: uppercase;
        }

        #sucesso { display: none; padding: 40px 10px; }
        .check-icon { font-size: 5rem; color: #2ecc71; margin-bottom: 20px; }

        footer { padding: 30px; font-size: 0.8rem; color: #aaa; text-align: center; background: rgba(0,0,0,0.7); width: 100%; }
        .footer-highlight { color: var(--deck-highlight); font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <img src="logo-deck.JPG" alt="Deck Logo" class="header-logo-img" data-aos="fade-down">
    </header>

    <div class="page-titles" data-aos="fade-up">
        <h1 class="main-brand-title">Deck Churrascaria</h1>
        <p class="survey-subtitle">PESQUISA DE SATISFAÇÃO</p>
    </div>

    <div class="container">
        <div class="card" data-aos="zoom-in" id="card-principal">
            <h2>Sua experiência hoje</h2>
            
            <form id="feedback-form">
                <label><i class="fas fa-user"></i> Qual o seu nome?</label>
                <input type="text" name="nome" placeholder="Digite seu nome" required>
                
                <label><i class="fab fa-whatsapp"></i> WhatsApp:</label>
                <input type="tel" name="whatsapp" placeholder="(19) 99999-9999" required>
              
                <label><i class="fas fa-drumstick-bite"></i> O ponto da carne estava correto?</label>
                <div class="stars-container">
                    <input type="radio" name="carne" id="c5" value="5" required><label for="c5" class="fas fa-star"></label>
                    <input type="radio" name="carne" id="c4" value="4"><label for="c4" class="fas fa-star"></label>
                    <input type="radio" name="carne" id="c3" value="3"><label for="c3" class="fas fa-star"></label>
                    <input type="radio" name="carne" id="c2" value="2"><label for="c2" class="fas fa-star"></label>
                    <input type="radio" name="carne" id="c1" value="1"><label for="c1" class="fas fa-star"></label>
                </div>

                <label><i class="fas fa-concierge-bell"></i> Como avalia nosso atendimento?</label>
                <div class="stars-container">
                    <input type="radio" name="atendimento" id="a5" value="5" required><label for="a5" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a4" value="4"><label for="a4" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a3" value="3"><label for="a3" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a2" value="2"><label for="a2" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a1" value="1"><label for="a1" class="fas fa-star"></label>
                </div>

                <label><i class="fas fa-beer"></i> Bebidas geladas?</label>
                <select name="bebidas" required>
                    <option value="" disabled selected>Selecione</option>
                    <option value="Sim">Sim, no ponto!</option>
                    <option value="Nao">Poderiam estar mais geladas</option>
                </select>

                <label><i class="fas fa-broom"></i> Limpeza e Organização:</label>
                <div class="stars-container">
                    <input type="radio" name="limpeza" id="l5" value="5" required><label for="l5" class="fas fa-star"></label>
                    <input type="radio" name="limpeza" id="l4" value="4"><label for="l4" class="fas fa-star"></label>
                    <input type="radio" name="limpeza" id="l3" value="3"><label for="l3" class="fas fa-star"></label>
                    <input type="radio" name="limpeza" id="l2" value="2"><label for="l2" class="fas fa-star"></label>
                    <input type="radio" name="limpeza" id="l1" value="1"><label for="l1" class="fas fa-star"></label>
                </div>

                <label><i class="fas fa-heart"></i> Recomendaria o Deck?</label>
                <select name="recomendacao" required>
                    <option value="" disabled selected>Selecione</option>
                    <option value="Sim">Com certeza!</option>
                    <option value="Talvez">Talvez</option>
                    <option value="Nao">Não</option>
                </select>

                <label><i class="fas fa-comment"></i> Alguma sugestão?</label>
                <textarea name="comentario" rows="2" placeholder="Opcional..."></textarea>

                <button type="submit" class="btn-enviar" id="btn-submit">ENVIAR AVALIAÇÃO</button>
            </form>

            <div id="sucesso">
                <i class="fas fa-check-circle check-icon"></i>
                <h3>VALEU, <span id="span-nome" style="color: var(--deck-highlight);"></span>!</h3>
                <p>Sua avaliação ajuda a manter nossa qualidade.</p>
                <button onclick="location.reload()" style="background:none; border:2px solid var(--deck-highlight); color:#fff; padding:12px 25px; border-radius:12px; margin-top:25px; cursor:pointer; font-weight: bold;">FAZER OUTRA</button>
            </div>
        </div>
    </div>

    <footer>
        Desenvolvido por <strong>Gabriel Piovesan</strong><br>
        <span class="footer-highlight">Tecnologia Deck Satisfaction</span> © 2026
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });
        
        const f = document.getElementById('feedback-form');
        const btnSubmit = document.getElementById('btn-submit');

        // TROQUE PELO SEU LINK DA PLANILHA DO DECK
        const scriptURL = 'COLOQUE_AQUI_O_LINK_DO_SCRIPT_DA_PLANILHA_DO_DECK';

        f.onsubmit = (e) => {
            e.preventDefault();
            btnSubmit.innerText = "ENVIANDO...";
            btnSubmit.disabled = true;

            const nome = f.nome.value.split(' ')[0].toUpperCase();
            document.getElementById('span-nome').innerText = nome;

            fetch(scriptURL, { method: 'POST', body: new FormData(f) })
                .then(response => {
                    f.style.display = 'none';
                    document.getElementById('card-principal').querySelector('h2').style.display = 'none';
                    document.getElementById('sucesso').style.display = 'block';
                    window.scrollTo(0,0);
                })
                .catch(error => {
                    btnSubmit.innerText = "ERRO! TENTE NOVAMENTE.";
                    btnSubmit.disabled = false;
                });
        };
    </script>
</body>
</html>
